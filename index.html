<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Falguni 🎉</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        overflow: hidden;
        text-align: center;
        color: white;
    }

    h1 {
        margin-top: 80px;
        font-size: 3rem;
        animation: glow 2s infinite alternate;
    }

    @keyframes glow {
        from { text-shadow: 0 0 10px #fff; }
        to { text-shadow: 0 0 25px #ff4da6, 0 0 40px #ff4da6; }
    }

    p {
        font-size: 1.5rem;
        margin-top: 10px;
    }

    button {
        margin-top: 30px;
        padding: 12px 25px;
        font-size: 18px;
        border: none;
        border-radius: 25px;
        background: #ff4da6;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ff1a8c;
        transform: scale(1.1);
    }

    /* Heart animation */
    .heart {
        position: absolute;
        color: red;
        font-size: 20px;
        animation: float 5s linear infinite;
    }

    @keyframes float {
        0% {
            transform: translateY(100vh) scale(1);
            opacity: 1;
        }
        100% {
            transform: translateY(-10vh) scale(1.5);
            opacity: 0;
        }
    }

    /* Hidden message */
    #surprise {
        display: none;
        margin-top: 30px;
        font-size: 2rem;
        color: #fff;
        animation: fadeIn 2s forwards;
    }

    @keyframes fadeIn {
        from {opacity: 0;}
        to {opacity: 1;}
    }

</style>
</head>

<body>

<h1>🎉 Happy Birthday Falguni 🎂</h1>
<p>Wishing you a day full of love, joy, and happiness ❤️</p>

<button onclick="showSurprise()">Click for Surprise 🎁</button>

<div id="surprise">💖 You are amazing, Falguni! 💖</div>

<script>
    function showSurprise() {
        document.getElementById("surprise").style.display = "block";
    }

    // Create floating hearts
    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";

        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
        heart.style.fontSize = (Math.random() * 20 + 15) + "px";

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }

    setInterval(createHeart, 300);
</script>

</body>
</html>
